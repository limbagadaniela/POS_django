<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dessert System - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --brand: #667eea; --brand-dark: #764ba2; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .login-container {
            background: #fff; border-radius: 20px;
            box-shadow: 0 24px 64px rgba(0,0,0,.28);
            padding: 3rem 2.5rem; width: 100%; max-width: 420px;
        }

        .pos-header { text-align: center; margin-bottom: 2rem; }
        .pos-icon { font-size: 3.5rem; margin-bottom: .75rem; }
        .pos-header h1 { font-size: 1.75rem; font-weight: 700; color: #1a1d2e; margin-bottom: .25rem; }
        .pos-header p { color: #6b7280; font-size: .9rem; }

        .form-group { margin-bottom: 1.4rem; }
        label { display: block; margin-bottom: .45rem; font-weight: 600; color: #1a1d2e; font-size: .9rem; }

        input[type="text"], input[type="password"] {
            width: 100%; padding: .8rem 1rem;
            border: 2px solid #e8eaf4; border-radius: 10px;
            font-size: 1rem; font-family: inherit;
            transition: border-color .2s;
        }
        input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(102,126,234,.12); }

        .btn-login {
            width: 100%; padding: .9rem;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            color: #fff; border: none; border-radius: 10px;
            font-size: 1.05rem; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: transform .2s, box-shadow .2s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,.35); }
        .btn-login:active { transform: translateY(0); }

        .error-message {
            background: #fee2e2; color: #dc2626; padding: .75rem 1rem;
            border-radius: 10px; margin-bottom: 1rem;
            border-left: 4px solid #dc2626; font-size: .9rem; font-weight: 500;
        }

        .info-text { text-align: center; color: #9ca3af; font-size: .82rem; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="pos-header">
            <div class="pos-icon">🛒</div>
            <h1>Dessert System</h1>
            <p>Cashier Login</p>
        </div>

        {% if form.non_field_errors %}
            <div class="error-message">{{ form.non_field_errors.0 }}</div>
        {% endif %}

        <!--
            Django: In your LoginView or urls.py, set next='/dashboard/' (or whatever
            your pos_dashboard URL is) so successful login redirects there automatically.
            e.g. LOGIN_REDIRECT_URL = 'pos_dashboard' in settings.py
        -->
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{% url 'pos_dashboard' %}">

            <div class="form-group">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn-login">Login →</button>
        </form>

        <div style="text-align:center;margin-top:1.25rem;font-size:.88rem;color:#6b7280">
            Don't have an account? <a href="{% url 'register' %}" style="color:var(--brand);font-weight:600;text-decoration:none">Register</a>
        </div>

        <div class="info-text">© 2024 Dessert System. All rights reserved.</div>
    </div>
</body>
</html>
